{% extends "base.html" %}

{% block content %}

<section class="products-section">

    <h2>Our Bouquets</h2>

    <p>
        Handmade crochet bouquets crafted with love.
    </p>

    <div class="products-grid">

        {% for product in products %}

        <div class="product-card">

            <div class="image-container">

                <img src="{{ url_for(
                    'static',
                    filename='images/products/' + product.image
                ) }}"
                alt="{{ product.name }}"
                class="product-image">

                <button class="hover-enquire"

                    onclick="event.stopPropagation();
                             addToWishlist(
                                '{{ product.name }}',
                                '{{ product.price }}'
                             )">

                    ❤️ Add to Wishlist

                </button>

            </div>

            <div class="product-info">

                <h3>{{ product.name }}</h3>

                <p class="price">

                    {{ product.price }}

                </p>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

<script>

document.querySelectorAll('.image-container')
.forEach(container => {

    container.addEventListener('click', function(e) {

        e.stopPropagation();

        document.querySelectorAll('.image-container')
        .forEach(c => {

            if (c !== this) {

                c.classList.remove('active');
            }
        });

        this.classList.toggle('active');
    });
});

document.addEventListener('click', function() {

    document.querySelectorAll('.image-container')
    .forEach(container => {

        container.classList.remove('active');
    });
});

</script>

{% endblock %}
